<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Minesweeper</title>

    <!-- http://proger.i-forge.net/The_smallest_transparent_pixel/ -->
    <link rel="icon" href="img/icon.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <form action="game.html" class="starting-scene" method="GET">

        <label for="difficulty">Difficulty:</label><br>
        <select id="difficulty" name="difficulty">
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
            <option value="impossible">Impossible</option>
            <option value="custom">Custom</option>
        </select>


        <div id="custom-settings" style="display:none;">
            <br>
            <div>
                <label for="cols">Cols:</label><br>
                <input type="number" id="cols" name="cols" value="10" min="1">
            </div>

            <div>
                <label for="rows">Rows:</label><br>
                <input type="number" id="rows" name="rows" value="10" min="1">
            </div>

            <div>
                <label for="mines">Mines:</label><br>
                <input type="number" id="mines" name="mines" value="10" min="1">
            </div>

        </div>

        <br>

        <input type="submit" value="Start">

    </form>

    <script>
        const difficulty = document.getElementById('difficulty');
        const customSettings = document.getElementById('custom-settings');

        const rowsInput = document.getElementById('rows');
        const colsInput = document.getElementById('cols');
        const minesInput = document.getElementById('mines');

        // Load saved values
        difficulty.value = localStorage.getItem('difficulty') || 'easy';
        rowsInput.value = localStorage.getItem('rows') || 10;
        colsInput.value = localStorage.getItem('cols') || 10;
        minesInput.value = localStorage.getItem('mines') || 10;

        function updateCustomVisibility() {
            customSettings.style.display =
                difficulty.value === 'custom'
                    ? 'block'
                    : 'none';
        }

        function updateMineLimit() {
            const rows = parseInt(rowsInput.value) || 1;
            const cols = parseInt(colsInput.value) || 1;

            const maxMines = rows * cols - 1;

            minesInput.max = maxMines;

            if ((parseInt(minesInput.value) || 0) > maxMines) {
                minesInput.value = maxMines;
            }
        }

        difficulty.addEventListener('change', updateCustomVisibility);

        rowsInput.addEventListener('input', updateMineLimit);
        colsInput.addEventListener('input', updateMineLimit);

        // Save settings before submit
        document.querySelector('form').addEventListener('submit', () => {
            localStorage.setItem('difficulty', difficulty.value);
            localStorage.setItem('rows', rowsInput.value);
            localStorage.setItem('cols', colsInput.value);
            localStorage.setItem('mines', minesInput.value);
        });

        updateCustomVisibility();
        updateMineLimit();
    </script>

</body>
</html>
